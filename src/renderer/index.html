<!DOCTYPE html>
<html>

<head>
  <title>LogAnalyzer</title>
  <link rel="stylesheet" href="app.css">
  <link rel="stylesheet" href="command-palette.css">
  <link href="../../kendo-ui/default-main-dark.css" rel="stylesheet">
  <script src="../../kendo-ui/jquery-3.7.0.min.js"></script>
  <script src="../../kendo-ui/kendo.all.min.js"></script>
</head>

<body>
  <div id="toolbar">
    <div class="toolbar-row">
      <div class="filter-toggle" data-action="toggleFilterPanel">
        <i>▼</i>
        <span>过滤条件</span>
      </div>
    </div>
    <div class="filter-section" id="filter-section">
      <div class="filter-container" id="filter-container"></div>
      <div class="filter-buttons">
        <button class="filter-button add-filter" data-action="addFilter">添加过滤条件</button>
        <button class="filter-button apply-filter" data-action="applyFilters">应用过滤器</button>
      </div>
    </div>
  </div>

  <div class="editors-container" id="editors-container">
    <div id="editor"></div>
    <div class="divider"></div>
    <div id="filtered-editor"></div>
  </div>

  <!-- Command palette overlay and palette -->
  <div id="commandOverlay" class="command-overlay"></div>
  <div id="commandPalette" class="command-palette">
    <input type="text" id="commandInput" class="command-palette-input" placeholder="输入命令...">
    <div id="commandList" class="command-list"></div>
  </div>

  <!-- Download progress bar (bottom right) -->
  <div id="downloadProgress" class="download-progress-container">
    <div class="download-progress-header">
      <span class="download-progress-title">下载中...</span>
      <button class="download-progress-close" data-action="hideDownloadProgress">×</button>
    </div>
    <div class="download-progress-bar">
      <div id="downloadProgressFill" class="download-progress-fill"></div>
    </div>
    <div class="download-progress-text">
      <span id="downloadProgressPercent">0%</span>
      <span id="downloadProgressSize">0MB / 0MB</span>
    </div>
    <div id="downloadProgressUrl" class="download-progress-url"></div>
  </div>

  <!-- Large file dialog (centered modal) -->
  <div id="largeFileDialogOverlay" class="large-file-dialog-overlay"></div>
  <div id="largeFileDialog" class="large-file-dialog">
    <h3>读取大文件</h3>
    <div class="large-file-dialog-content">
      <div class="large-file-dialog-field">
        <label>时间戳（可选）</label>
        <input type="text" id="timestampInput"
          placeholder="例如: 11.04-19.19.39 或 11.04-19.19">
        <div class="file-info-text">UE格式: MM.DD-HH.mm.ss 或 MM.DD-HH.mm（可省略秒）</div>
      </div>
      <div class="large-file-dialog-field">
        <label>读取大小（MB）</label>
        <input type="number" id="readSizeInput" value="100" min="1" max="1000">
        <div class="file-info-text">默认100MB，最大1000MB</div>
      </div>
    </div>
    <div class="large-file-dialog-buttons">
      <button class="large-file-dialog-button secondary" data-action="closeLargeFileDialog">取消</button>
      <button class="large-file-dialog-button primary" data-action="confirmReadLargeFile">读取</button>
    </div>
  </div>

  <!-- Custom confirm dialog -->
  <div id="confirmDialogOverlay" class="large-file-dialog-overlay"></div>
  <div id="confirmDialog" class="large-file-dialog">
    <h3 id="confirmDialogTitle">确认</h3>
    <div class="large-file-dialog-content">
      <div id="confirmDialogMessage" style="color:#e0e0e0; font-size:14px; line-height:1.6; white-space:pre-wrap;"></div>
    </div>
    <div class="large-file-dialog-buttons">
      <button class="large-file-dialog-button secondary" data-action="closeConfirmDialog" data-arg="false">取消</button>
      <button class="large-file-dialog-button primary" data-action="closeConfirmDialog" data-arg="true">确定</button>
    </div>
  </div>

  <!-- Scripts: compiled TS outputs are at ../../dist/renderer/renderer/ relative to this HTML -->
  <!-- Monaco loader is injected dynamically by app.js to handle packaged vs dev paths -->
  <script src="../../dist/renderer/renderer/command-palette.js"></script>
  <script src="../../dist/renderer/renderer/divider.js"></script>
  <script src="../../dist/renderer/renderer/renderer-inputbox.js"></script>
  <script src="../../dist/renderer/renderer/app.js"></script>
</body>

</html>
