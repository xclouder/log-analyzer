<!DOCTYPE html>
<html>
<head>
  <title>Editor</title>
  <style>
    body { margin:0; padding:0; height:100vh; display:flex; flex-direction:column; background-color:#1e1e1e; color:#d4d4d4; font-family:'Consolas','Courier New',monospace; }
    #editor { width:100%; height:100%; resize:none; background-color:#1e1e1e; color:#d4d4d4; border:none; padding:10px; font-family:'Consolas','Courier New',monospace; font-size:14px; line-height:1.5; outline:none; box-sizing:border-box; }
  </style>
</head>
<body>
  <textarea id="editor" spellcheck="false"></textarea>
  <script>
    // Receive content from main process via preload
    window.electronAPI.onSetContent(function(event, content) {
      document.getElementById('editor').value = content;
    });
    document.getElementById('editor').addEventListener('input', function() {
      window.electronAPI.sendContentChanged(this.value);
    });
  </script>
</body>
</html>
